name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    # Definimos los servicios (Base de datos temporal para los tests)
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    strategy:
      matrix:
        # Enfocamos en las versiones modernas que acordamos
        node-version: [20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run build (if present)
      run: npm run build --if-present

    - name: Run Tests
      # Definimos las variables de entorno necesarias para que los tests conecten
      env:
        NODE_ENV: test
        MONGO_URI: mongodb://localhost:27017/task_manager_test
        JWT_SECRET: ${{ secrets.JWT_SECRET_TEST || 'test_secret_key_123' }}
      run: npm test
