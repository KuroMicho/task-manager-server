name: Node.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run build (if present)
        run: npm run build --if-present

      - name: Run Tests
        env:
          NODE_ENV: test
          MONGO_URI_TEST: mongodb://localhost:27017/task_manager_test
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST || 'test_secret_key_123' }}
        run: npm test

      - name: Deploy to Render
        if: github.ref == 'refs/heads/main' && success()
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
